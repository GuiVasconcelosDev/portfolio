spring:
  application:
    name: portfolio

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driverClassName: org.postgresql.Driver

  
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    sql-show: false

app:
  frontend:
    url: ${FRONTEND_URL:https://portfolio-dev-full.vercel.app}