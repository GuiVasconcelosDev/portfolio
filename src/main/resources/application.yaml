spring:
  application:
    name: portfolio

  datasource:
    url: jdbc:h2:mem:portfoliodb
    driverClassName: org.h2.Driver
    username: port
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        trace: false
        web-allow-others: false
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true